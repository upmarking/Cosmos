android.useAndroidX=true
android.enableJetifier=false
# 3GB is safe for most systems to allocate, while 1 worker prevents memory spikes
org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=1024m -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError
kotlin.daemon.jvmargs=-Xmx1536m
# STRICTly limit to 1 worker and no parallelism to avoid OOM during mergeExtDex
org.gradle.workers.max=1
org.gradle.parallel=false
org.gradle.caching=true
android.nonTransitiveRClass=true
# Specifically disable parallel dexing
android.enableDexingArtifactTransform.parallel=false
org.gradle.vfs.watch=false
