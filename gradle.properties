android.useAndroidX=true
android.enableJetifier=false
# Reduced memory to fit within 7GB system RAM
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError
kotlin.daemon.jvmargs=-Xmx1024m
# STRICTly limit to 1 worker and no parallelism to avoid OOM during mergeExtDex
org.gradle.workers.max=1
org.gradle.parallel=false
org.gradle.caching=true
android.nonTransitiveRClass=true
# Specifically disable parallel dexing
android.enableDexingArtifactTransform.parallel=false
org.gradle.vfs.watch=false
