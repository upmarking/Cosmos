  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Cosmos — Professional Networking</title>
  <script>
    window.addEventListener('error', function(e) {
      console.error("Global Error Caught: ", e);
      var errDiv = document.getElementById('debug-error-box') || document.createElement('div');
      errDiv.id = 'debug-error-box';
      errDiv.style.color = '#f87171';
      errDiv.style.background = 'rgba(248,113,113,0.1)';
      errDiv.style.border = '1px solid rgba(248,113,113,0.3)';
      errDiv.style.padding = '10px';
      errDiv.style.margin = '20px auto';
      errDiv.style.maxWidth = '400px';
      errDiv.style.borderRadius = '8px';
      errDiv.style.fontSize = '12px';
      errDiv.style.fontFamily = 'monospace';
      errDiv.style.textAlign = 'left';
      errDiv.style.whiteSpace = 'pre-wrap';
      errDiv.innerHTML = '<strong>JS Error:</strong> ' + e.message + '\nat ' + e.filename + ':' + e.lineno + ':' + e.colno;
      
      var splashContent = document.querySelector('.splash-content');
      if (splashContent) {
        splashContent.appendChild(errDiv);
        var loader = document.querySelector('.splash-loader');
        if (loader) loader.style.display = 'none';
      } else {
        document.body.appendChild(errDiv);
      }
    });

    window.addEventListener('unhandledrejection', function(e) {
      console.error("Unhandled Promise Rejection: ", e.reason);
      var errDiv = document.getElementById('debug-error-box') || document.createElement('div');
      errDiv.id = 'debug-error-box';
      errDiv.style.color = '#f87171';
      errDiv.style.background = 'rgba(248,113,113,0.1)';
      errDiv.style.border = '1px solid rgba(248,113,113,0.3)';
      errDiv.style.padding = '10px';
      errDiv.style.margin = '20px auto';
      errDiv.style.maxWidth = '400px';
      errDiv.style.borderRadius = '8px';
      errDiv.style.fontSize = '12px';
      errDiv.style.fontFamily = 'monospace';
      errDiv.style.textAlign = 'left';
      errDiv.style.whiteSpace = 'pre-wrap';
      errDiv.innerHTML = '<strong>Promise Rejection:</strong> ' + (e.reason ? (e.reason.message || e.reason) : 'Unknown Promise Rejection');
      
      var splashContent = document.querySelector('.splash-content');
      if (splashContent) {
        splashContent.appendChild(errDiv);
        var loader = document.querySelector('.splash-loader');
        if (loader) loader.style.display = 'none';
      } else {
        document.body.appendChild(errDiv);
      }
    });
  </script>

  <script>
    // Register service worker and handle updates automatically (disabled on localhost for development)
    if ('serviceWorker' in navigator) {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister();
            console.log('[Cosmos] Unregistered service worker for local development');
          }
        });
      } else {
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            console.log('[Cosmos] SW controller changed. Reloading page...');
            window.location.reload();
          }
        });

        navigator.serviceWorker.register('sw.js')
          .then((reg) => {
            console.log('[Cosmos] SW registered');

            // If there's an update already waiting, skip waiting immediately
            if (reg.waiting) {
              reg.waiting.postMessage({ action: 'skipWaiting' });
            }

            // Listen for new service worker updates being found
            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed') {
                  if (navigator.serviceWorker.controller) {
                    // New update is ready and waiting, skip waiting to trigger controllerchange
                    installingWorker.postMessage({ action: 'skipWaiting' });
                  }
                }
              };
            };
          })
          .catch((err) => console.warn('[Cosmos] SW registration failed:', err));
      }
    }
  </script>
