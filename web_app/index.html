<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Cosmos — Professional Networking</title>
  <meta name="description" content="Cosmos is a premium professional networking platform for founders, operators, investors, and builders who value quality over quantity." />
  <meta name="theme-color" content="#060811" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cosmos" />
  <meta property="og:title" content="Cosmos — Professional Networking" />
  <meta property="og:description" content="Premium networking for founders, operators, and builders." />
  <meta property="og:type" content="website" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ==================== SPLASH SCREEN ==================== -->
  <div class="splash-screen" id="splash-screen">
    <div class="splash-content">
      <div class="splash-logo">
        <div class="splash-orb"></div>
        <img class="splash-icon" src="icons/logo.webp" alt="Cosmos Logo" style="border-radius: 12px; object-fit: cover;" />
      </div>
      <h1 class="splash-title">Cosmos</h1>
      <p class="splash-tagline">Where Builders Connect</p>
      <div class="splash-loader">
        <div class="splash-loader-bar"></div>
      </div>
    </div>
  </div>

  <!-- ==================== TOP BAR ==================== -->
  <header class="top-bar" id="top-bar">
    <div class="top-bar-inner">
      <a href="#/connect" class="top-bar-logo" id="top-logo">
        <img src="icons/logo.webp" alt="Cosmos Logo" width="28" height="28" style="border-radius: 6px; object-fit: cover;" />
        <span class="top-bar-title">Cosmos</span>
      </a>
      <div class="top-bar-actions">
        <button class="top-bar-btn" id="btn-notifications" onclick="window.location.hash='#/notifications'" aria-label="Notifications">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-badge" id="notif-badge" style="display:none;">3</span>
        </button>
        <button class="top-bar-btn" id="btn-chat" onclick="window.location.hash='#/conversations'" aria-label="Messages">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ==================== MAIN CONTENT ==================== -->
  <main class="app-content" id="app">
    <!-- Pages render here -->
  </main>

  <!-- ==================== BOTTOM NAVIGATION ==================== -->
  <nav class="bottom-nav" id="bottom-nav">
    <a href="#/connect" class="nav-tab active" data-route="/connect" id="tab-connect">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="10"/>
        <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
        <line x1="9" y1="9" x2="9.01" y2="9"/>
        <line x1="15" y1="9" x2="15.01" y2="9"/>
      </svg>
      <span>Connect</span>
    </a>
    <a href="#/events" class="nav-tab" data-route="/events" id="tab-events">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Events</span>
    </a>
    <a href="#/social" class="nav-tab" data-route="/social" id="tab-social">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
        <line x1="4" y1="22" x2="4" y2="15"/>
      </svg>
      <span>Social</span>
    </a>
    <a href="#/communities" class="nav-tab" data-route="/communities" id="tab-communities">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>Orbits</span>
    </a>
    <a href="#/profile" class="nav-tab" data-route="/profile" id="tab-profile">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Profile</span>
    </a>
  </nav>

  <!-- ==================== TOAST CONTAINER ==================== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ==================== SCRIPTS ==================== -->
  <script type="module" src="js/app.js"></script>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('[Cosmos] SW registered'))
        .catch((err) => console.warn('[Cosmos] SW registration failed:', err));
    }
  </script>

</body>
</html>
